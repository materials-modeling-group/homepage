name: Check invited talks

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜 01:00 UTC（日本時間 月曜 10:00）
  workflow_dispatch:      # 手動実行も可能

permissions:
  contents: write

jobs:
  check-invited-talks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for new invited talks via SAMURAI
        run: python3 scripts/check_invited_talks.py

      - name: Pull remote changes (GAS may have committed)
        run: git pull --rebase origin main

      - name: Check for changes in known_talk_ids
        id: diff
        run: |
          git diff --quiet data/known_talk_ids.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push known_talk_ids
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/known_talk_ids.json
          git commit -m "招待講演の既知IDリストを更新"
          git push
